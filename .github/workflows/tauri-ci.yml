name: tauri-ci

on:
  push:
    paths:
      - "desktop/tauri/**"
      - "packages/engine/**"
      - "portal/public/**"
      - "scripts/tauri-collab-smoke.py"
      - "scripts/acceptance-desktop.sh"
      - "scripts/acceptance-tz-remaining.py"
      - ".github/workflows/tauri-ci.yml"
  pull_request:
    paths:
      - "desktop/tauri/**"
      - "packages/engine/**"
      - "portal/public/**"
      - "scripts/**"
      - ".github/workflows/tauri-ci.yml"
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/tauri
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/tauri/package-lock.json
      - run: npm ci
      - run: npm run build

  collab-and-tz-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Local TZ acceptance (no portal)
        run: |
          chmod +x scripts/acceptance-desktop.sh scripts/acceptance-tz-remaining.py
          python3 scripts/acceptance-tz-remaining.py --forms 10 --skip-portal

  windows-nsis:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/tauri/src-tauri
      - name: Build NSIS
        working-directory: desktop/tauri
        run: |
          npm ci
          npm run build:tauri:nsis
      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: oko-zapolnenie-windows-nsis
          path: |
            desktop/tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/tauri/src-tauri
      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build AppImage
        working-directory: desktop/tauri
        run: |
          npm ci
          npx tauri build --bundles appimage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: oko-zapolnenie-linux-appimage
          path: |
            desktop/tauri/src-tauri/target/release/bundle/appimage/*
          if-no-files-found: warn
