# OKO API for VPS / Railway / local production
# Portal: deploy separately (Vercel) with VITE_API_URL pointing to this API
services:
  api:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - oko-data:/app/data
    environment:
      PORT: "3001"
      OKO_DB_PATH: /app/data/oko.db
      DATABASE_URL: ${DATABASE_URL:-}
      OKO_ADMIN_TOKEN: ${OKO_ADMIN_TOKEN:-}
      OKO_USER_TOKEN: ${OKO_USER_TOKEN:-}
      OKO_BOOTSTRAP_ADMIN_USER: ${OKO_BOOTSTRAP_ADMIN_USER:-}
      OKO_BOOTSTRAP_ADMIN_PASSWORD: ${OKO_BOOTSTRAP_ADMIN_PASSWORD:-}
    restart: unless-stopped

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oko
      POSTGRES_PASSWORD: oko
      POSTGRES_DB: oko
    ports:
      - "5432:5432"
    volumes:
      - oko-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oko -d oko"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oko-data:
  oko-pg:
